<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Glow Calendar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0a0a0a;--card:#0e0e0e;--c2:#141414;--bd:#1c1c1c;--bd2:#252525;--t1:#888;--t2:#666;--t3:#3a3a3a;--t4:#2e2e2e;--itm:#1e1e1e;--dn:#2a2a2a;--dt:#555;}
html.L{--bg:#f0efe9;--card:#fff;--c2:#f5f4ef;--bd:#e0dfd8;--bd2:#ccc;--t1:#555;--t2:#777;--t3:#aaa;--t4:#bbb;--itm:#ebe9e1;--dn:#bbb;--dt:#444;}
html,body{background:var(--bg);margin:0;padding:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;transition:background .25s;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.view{display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:74px;}
.view.on{display:block;}
.sa{padding:max(env(safe-area-inset-top,16px),24px) 12px 0;display:flex;flex-direction:column;align-items:center;gap:8px;}
.tbar{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom,0px));background:var(--card);border-top:.5px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--t3);}
.tab.on{color:var(--t1);}
.ti{font-size:18px;line-height:1;}.tl{font-size:10px;}
/* calendar */
.cc{background:var(--card);border-radius:18px;padding:1.25rem 1.1rem;width:100%;max-width:420px;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.nside{display:flex;align-items:center;gap:6px;}
.nb{background:none;border:.5px solid var(--bd2);color:var(--t2);border-radius:8px;padding:6px 14px;font-size:16px;line-height:1;cursor:pointer;}
.thb{background:none;border:.5px solid var(--bd2);color:var(--t3);border-radius:8px;padding:5px 10px;font-size:14px;line-height:1;cursor:pointer;}
.nm{font-size:13px;font-weight:500;color:var(--t1);letter-spacing:.05em;}
.dr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px;}
.dr div{font-size:9px;color:var(--t4);text-align:center;padding-bottom:3px;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dc{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;}
.dot{border-radius:50%;margin:auto;transition:all .25s;}
.dn{font-size:9px;color:var(--dn);text-align:center;}
.today .dn{color:var(--dt);}
/* panel */
.panel{display:none;width:100%;max-width:420px;background:var(--card);border-radius:14px;border:.5px solid var(--bd);padding:1.1rem 1.15rem;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.pd{font-size:12px;color:var(--t2);}
.xb{background:none;border:none;color:var(--t3);font-size:18px;line-height:1;cursor:pointer;padding:2px 6px;}
.sl{font-size:10px;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.dw{display:flex;flex-direction:column;align-items:center;margin-bottom:4px;}
.dbg{background:#0e0e0e;border-radius:12px;padding:6px 4px 2px;}
#dsv{width:100%;max-width:290px;touch-action:none;display:block;cursor:grab;}
#dsv:active{cursor:grabbing;}
.dlb{font-size:11px;color:var(--t3);text-align:center;margin-top:6px;height:16px;letter-spacing:.04em;}
.dv{height:.5px;background:var(--bd);margin:1rem 0;}
.nl{margin-bottom:10px;display:flex;flex-direction:column;gap:5px;}
.nr{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;background:var(--c2);border-radius:8px;}
.ndt{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.nt{flex:1;font-size:13px;color:var(--t2);line-height:1.5;}
.ndl{background:none;border:none;color:var(--t4);font-size:16px;padding:0 2px;line-height:1;cursor:pointer;}
.ne{font-size:12px;color:var(--t4);padding:4px 0;}
.ar{display:flex;gap:7px;}
.ar input{flex:1;background:var(--c2);border:.5px solid var(--bd);color:var(--t1);border-radius:8px;padding:9px 11px;font-size:13px;outline:none;font-family:inherit;}
.ar input::placeholder{color:var(--t4);}
.abt{background:var(--itm);border:none;color:var(--t2);border-radius:8px;padding:9px 16px;font-size:17px;font-weight:500;cursor:pointer;}
.hbt{background:none;border:none;color:var(--t4);font-size:11px;cursor:pointer;padding:4px 0;display:block;margin:0 auto;text-align:center;}
.hp{display:none;width:100%;max-width:420px;background:var(--card);border-radius:12px;border:.5px solid var(--bd);padding:.9rem 1.1rem;}
.hp.on{display:block;}
.hr{display:flex;align-items:center;gap:10px;padding:5px 0;}
.hdot{border-radius:50%;flex-shrink:0;}
.ht{font-size:12px;color:var(--t3);line-height:1.4;}
/* todo */
.ts{width:100%;max-width:420px;background:var(--card);border-radius:14px;border:.5px solid var(--bd);overflow:hidden;transition:border-color .15s;}
.ts.dov{border-color:rgba(255,255,255,.35);}
html.L .ts.dov{border-color:rgba(0,0,0,.25);}
.sh{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem .5rem;}
.stit{font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;}
.scnt{font-size:10px;color:var(--t4);}
.sli{min-height:4px;}
.ti2{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-top:.5px solid var(--bd);user-select:none;-webkit-user-select:none;transition:opacity .15s;}
.ti2.da{opacity:.3;}
.ck{width:16px;height:16px;border-radius:50%;border:1px solid var(--t4);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.ti2.done .ck{background:var(--t3);border-color:var(--t3);}
.ti2.done .ck::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px);display:block;}
.tw{flex:1;min-width:0;}
.tt{font-size:13px;color:var(--t2);line-height:1.45;}
.ti2.done .tt{color:var(--t4);text-decoration:line-through;}
.tdt{font-size:10px;color:var(--t4);margin-top:2px;}
.tdl{background:none;border:none;color:var(--t4);font-size:15px;padding:0 2px;line-height:1;cursor:pointer;}
.ta{display:flex;gap:7px;padding:.7rem 1rem;border-top:.5px solid var(--bd);align-items:center;}
.ta input[type=text]{flex:1;background:none;border:none;color:var(--t1);font-size:13px;outline:none;font-family:inherit;min-width:0;}
.ta input[type=text]::placeholder{color:var(--t4);}
.ta input[type=date]{background:none;border:none;color:var(--t3);font-size:11px;outline:none;font-family:inherit;min-width:0;max-width:95px;color-scheme:dark;}
html.L .ta input[type=date]{color-scheme:light;}
.tpb{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;}
.sb{width:100%;max-width:420px;background:var(--card);border-radius:12px;border:.5px solid var(--bd);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.stx{font-size:12px;color:var(--t2);flex:1;}
.sbt{background:var(--itm);border:none;color:var(--t1);border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;white-space:nowrap;}
.ghost{position:fixed;pointer-events:none;z-index:9999;background:var(--card);border-radius:10px;border:.5px solid var(--bd2);padding:8px 12px;font-size:13px;color:var(--t1);box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:280px;transform:rotate(1.5deg) scale(1.02);opacity:.92;}
</style>
</head>
<body>
<div class="app">

<div class="view on" id="vcal"><div class="sa">
  <div class="cc">
    <div class="nav">
      <div class="nside"><button class="nb" id="pb">‹</button></div>
      <span class="nm" id="ml"></span>
      <div class="nside">
        <button class="thb" id="thb">☽</button>
        <button class="nb" id="nbt">›</button>
      </div>
    </div>
    <div class="dr" id="dwr"></div>
    <div class="cg" id="cgr"></div>
  </div>
  <div class="panel" id="dp">
    <div class="ph"><div class="pd" id="pdt"></div><button class="xb" id="xb">×</button></div>
    <div class="sl">свечение дня</div>
    <div class="dw"><div class="dbg">
      <svg id="dsv" overflow="hidden" viewBox="0 0 290 165">
        <line x1="145" y1="6" x2="145" y2="22" stroke="rgba(255,255,255,.55)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="145" cy="26" r="1.5" fill="rgba(255,255,255,.3)"/>
        <g id="dg"></g>
      </svg>
    </div><div class="dlb" id="dlb"></div></div>
    <div class="dv"></div>
    <div class="sl">заметки</div>
    <div class="nl" id="nl"></div>
    <div class="ar"><input id="ni" type="text" maxlength="140" placeholder="Что сделано сегодня?"/><button class="abt" id="ab">+</button></div>
  </div>
  <button class="hbt" id="hbt">как это работает?</button>
  <div class="hp" id="hpan">
    <div class="hr"><div class="hdot" style="width:7px;height:7px;background:#1c1c1c"></div><span class="ht">нет — день прошёл незаметно</span></div>
    <div class="hr"><div class="hdot" style="width:7px;height:7px;background:rgba(255,255,255,.35);box-shadow:0 0 6px 2px rgba(255,255,255,.18)"></div><span class="ht">слабое — что-то небольшое сделано</span></div>
    <div class="hr"><div class="hdot" style="width:7px;height:7px;background:rgba(255,255,255,.68);box-shadow:0 0 9px 3px rgba(255,255,255,.35)"></div><span class="ht">среднее — хороший продуктивный день</span></div>
    <div class="hr"><div class="hdot" style="width:7px;height:7px;background:rgba(255,255,255,.97);box-shadow:0 0 13px 5px rgba(255,255,255,.6)"></div><span class="ht">яркое — сильный насыщенный день</span></div>
    <div class="hr"><div class="hdot" style="width:7px;height:7px;background:rgb(255,240,190);box-shadow:0 0 14px 5px rgba(255,230,150,.75)"></div><span class="ht">золото — выдающийся день</span></div>
  </div>
</div></div>

<div class="view" id="vtodo"><div class="sa">
  <div class="ts" id="sec-today" data-sec="today">
    <div class="sh"><span class="stit">Сегодня</span><span class="scnt" id="ct"></span></div>
    <div class="sli" id="lt"></div>
    <div class="ta"><input type="text" id="ait" placeholder="Задача на сегодня…" maxlength="140"/><button class="tpb" data-sec="today">+</button></div>
  </div>
  <div class="ts" id="sec-tomorrow" data-sec="tomorrow">
    <div class="sh"><span class="stit">Завтра</span><span class="scnt" id="ctm"></span></div>
    <div class="sli" id="ltm"></div>
    <div class="ta"><input type="text" id="aitm" placeholder="Задача на завтра…" maxlength="140"/><button class="tpb" data-sec="tomorrow">+</button></div>
  </div>
  <div class="ts" id="sec-later" data-sec="later">
    <div class="sh"><span class="stit">Позже</span><span class="scnt" id="cl"></span></div>
    <div class="sli" id="ll"></div>
    <div class="ta"><input type="text" id="ail" placeholder="Задача…" maxlength="140"/><input type="date" id="datl"/><button class="tpb" data-sec="later">+</button></div>
  </div>
  <div class="sb" id="sbar" style="display:none">
    <span class="stx" id="stx"></span>
    <button class="sbt" id="sbt">Обновить свечение →</button>
  </div>
</div></div>

<div class="tbar">
  <button class="tab on" id="tab-cal"><div class="ti">◌</div><div class="tl">Дни</div></button>
  <button class="tab" id="tab-todo"><div class="ti">≡</div><div class="tl">Задачи</div></button>
</div>
</div>

<script>
const tg=window.Telegram?.WebApp;
tg?.expand();tg?.disableVerticalSwipes?.();
const H=tg?.HapticFeedback,CS=tg?.CloudStorage;
const hTick=()=>H?H.selectionChanged():navigator.vibrate?.(6);
const hSnap=()=>H?H.impactOccurred('medium'):navigator.vibrate?.([5,20,5]);
const hNote=()=>H?H.notificationOccurred('success'):navigator.vibrate?.(8);
const hTap=()=>H?H.impactOccurred('light'):navigator.vibrate?.(4);

const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const DN=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const LVD=[
  {l:'нет свечения',bg:'#1c1c1c',sh:'none',sz:'5px'},
  {l:'слабое белое',bg:'rgba(255,255,255,.35)',sh:'0 0 7px 2px rgba(255,255,255,.2)',sz:'6px'},
  {l:'среднее белое',bg:'rgba(255,255,255,.68)',sh:'0 0 11px 4px rgba(255,255,255,.4)',sz:'7px'},
  {l:'яркое белое',bg:'rgba(255,255,255,.97)',sh:'0 0 16px 6px rgba(255,255,255,.65)',sz:'8px'},
  {l:'белое с золотом',bg:'rgb(255,240,185)',sh:'0 0 18px 7px rgba(255,225,130,.8)',sz:'8px'},
];
const LVL=[
  {l:'нет свечения',bg:'#d0d0d0',sh:'none',sz:'5px'},
  {l:'слабое',bg:'#999',sh:'0 0 4px 1px rgba(0,0,0,.2)',sz:'6px'},
  {l:'среднее',bg:'#555',sh:'0 0 6px 2px rgba(0,0,0,.3)',sz:'7px'},
  {l:'яркое',bg:'#111',sh:'0 0 8px 3px rgba(0,0,0,.45)',sz:'8px'},
  {l:'с золотом',bg:'#b8860b',sh:'0 0 10px 4px rgba(184,134,11,.5)',sz:'8px'},
];
const LV=()=>document.documentElement.classList.contains('L')?LVL:LVD;

let db={},todos=[],theme='dark';
let cy=new Date().getFullYear(),cm=new Date().getMonth(),sel=null;

// storage
const SK={c:'gcv4',t:'gctos',th:'gcthm'};
const save=(k,v)=>{const s=typeof v==='string'?v:JSON.stringify(v);if(CS)CS.setItem(k,s,()=>{});else try{localStorage.setItem(k,s);}catch(_){}};
async function loadAll(){return new Promise(r=>{
  if(CS&&CS.getItems){CS.getItems(Object.values(SK),(e,v)=>{if(!e&&v){try{if(v[SK.c])db=JSON.parse(v[SK.c]);}catch(_){}try{if(v[SK.t])todos=JSON.parse(v[SK.t]);}catch(_){}try{if(v[SK.th])theme=v[SK.th];}catch(_){}}r();});}
  else if(CS){let n=3;const d=()=>{if(!--n)r();};CS.getItem(SK.c,(e,v)=>{try{if(v)db=JSON.parse(v);}catch(_){}d();});CS.getItem(SK.t,(e,v)=>{try{if(v)todos=JSON.parse(v);}catch(_){}d();});CS.getItem(SK.th,(e,v)=>{try{if(v)theme=v;}catch(_){}d();});}
  else{['c','t','th'].forEach(k=>{try{const v=localStorage.getItem(SK[k]);if(!v)return;k==='c'?db=JSON.parse(v):k==='t'?todos=JSON.parse(v):theme=v;}catch(_){}});r();}
});}

// theme
function applyTheme(sv){
  const l=theme==='light';document.documentElement.classList.toggle('L',l);
  document.getElementById('thb').textContent=l?'○':'☽';
  const bg=l?'#f0efe9':'#0a0a0a';tg?.setHeaderColor?.(bg);tg?.setBackgroundColor?.(bg);
  buildDial();render();if(sv)save(SK.th,theme);
}
document.getElementById('thb').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';applyTheme(true);hTap();});

// dial
const CX=145,CY=152,R=114,IA=[205,237,270,303,335],SN=[65,33,0,-33,-65];
let da=SN[0],dDr=false,dSA=0,dSda=0,dLi=0;
const p2c=(a,r=R)=>({x:CX+r*Math.cos(a*Math.PI/180),y:CY+r*Math.sin(a*Math.PI/180)});
const DC={a:'#1e1e1e',tm:'#2e2e2e',tn:'#191919',IF:['#0a0a0a','#141414','#252525','#3a3a3a','#3c2e06'],IS:['#1e1e1e','#2a2a2a','#777','#ccc','#966e18'],IR:[2.2,2.8,3.8,4.5,4.5],II:['#1e1e1e','rgba(255,255,255,.18)','rgba(255,255,255,.6)','rgba(255,255,255,.97)','rgb(255,212,90)']};

function buildDial(){
  const g=document.getElementById('dg');if(!g)return;
  let h=`<path d="M${CX-R} ${CY} A${R} ${R} 0 0 1 ${CX+R} ${CY}" fill="none" stroke="${DC.a}" stroke-width="1"/>`;
  for(let a=186;a<=354;a+=4){if(IA.some(ia=>Math.abs(ia-a)<9))continue;const lg=a%20===0,len=lg?11:5,o=p2c(a),i2=p2c(a,R-len);h+=`<line x1="${o.x.toFixed(1)}" y1="${o.y.toFixed(1)}" x2="${i2.x.toFixed(1)}" y2="${i2.y.toFixed(1)}" stroke="${lg?DC.tm:DC.tn}" stroke-width="${lg?1:.6}"/>`;}
  IA.forEach((a,i)=>{const{x,y}=p2c(a);h+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="13" fill="${DC.IF[i]}" stroke="${DC.IS[i]}" stroke-width=".75"/>`;h+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${DC.IR[i]}" fill="${DC.II[i]}"/>`;});
  g.innerHTML=h;
}
const getNI=a=>{let b=0,bd=1e9;SN.forEach((s,i)=>{const d=Math.abs(s-a);d<bd&&(bd=d,b=i);});return b;};
function applyDial(a,anim){const g=document.getElementById('dg');if(!g)return;g.style.transformBox='view-box';g.style.transformOrigin=`${CX}px ${CY}px`;g.style.transition=anim?'transform .2s cubic-bezier(.25,.8,.25,1)':'none';g.style.transform=`rotate(${a}deg)`;document.getElementById('dlb').textContent=LVD[getNI(a)].l;}
async function snapDial(anim){const i=getNI(da);da=SN[i];applyDial(da,anim);hSnap();if(sel){dg(sel).glow=i;save(SK.c,db);render();renderNotes();}}
function svgPt(e,sv){const r=sv.getBoundingClientRect();return{x:(e.clientX-r.left)*(290/r.width),y:(e.clientY-r.top)*(165/r.height)};}
function initDial(){
  buildDial();applyDial(da,false);
  const sv=document.getElementById('dsv');
  sv.addEventListener('pointerdown',e=>{dDr=true;const pt=svgPt(e,sv);dSA=Math.atan2(pt.y-CY,pt.x-CX)*180/Math.PI;dSda=da;dLi=getNI(da);sv.setPointerCapture(e.pointerId);e.preventDefault();},{passive:false});
  sv.addEventListener('pointermove',e=>{if(!dDr)return;const pt=svgPt(e,sv);let ang=Math.atan2(pt.y-CY,pt.x-CX)*180/Math.PI;let d=ang-dSA;if(d>180)d-=360;if(d<-180)d+=360;da=Math.max(-78,Math.min(78,dSda+d));applyDial(da,false);const ni=getNI(da);if(ni!==dLi){dLi=ni;hTick();}});
  const end=async()=>{if(!dDr)return;dDr=false;await snapDial(true);};
  sv.addEventListener('pointerup',end);sv.addEventListener('pointercancel',end);
}

// calendar
const key=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const dg=k=>{if(!db[k])db[k]={glow:0,notes:[]};return db[k];};
function renderDOW(){const row=document.getElementById('dwr');row.innerHTML='';DS.forEach(d=>{const s=document.createElement('div');s.textContent=d;row.appendChild(s);});}
function render(){
  document.getElementById('ml').textContent=`${MN[cm]} ${cy}`;
  const gr=document.getElementById('cgr');gr.innerHTML='';
  const lv=LV(),tk=key(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const fd=new Date(cy,cm,1).getDay(),off=fd===0?6:fd-1,tot=new Date(cy,cm+1,0).getDate();
  for(let i=0;i<off;i++)gr.appendChild(document.createElement('div'));
  for(let d=1;d<=tot;d++){
    const dk=key(cy,cm,d),gi=(db[dk]||{}).glow||0,g=lv[gi];
    const isT=dk===tk,isS=dk===sel;
    const cell=document.createElement('div');cell.className='dc'+(isT?' today':'');
    const dot=document.createElement('div');dot.className='dot';
    dot.style.cssText=`width:${g.sz};height:${g.sz};background:${g.bg};box-shadow:${g.sh};${isS?'outline:1px solid rgba(255,255,255,.2);outline-offset:2px;':''}${isT&&!isS?'outline:1px solid var(--bd2);outline-offset:2px;':''}`;
    const lb=document.createElement('div');lb.className='dn';lb.textContent=d;
    cell.appendChild(dot);cell.appendChild(lb);
    cell.addEventListener('click',()=>{sel=dk;hTap();render();renderPanel();});
    gr.appendChild(cell);
  }
}
function renderPanel(){
  const p=document.getElementById('dp');if(!sel){p.style.display='none';return;}
  p.style.display='block';
  const[y,m,d]=sel.split('-').map(Number);
  document.getElementById('pdt').textContent=`${d} ${MN[m-1].toLowerCase()} ${y}, ${DN[new Date(y,m-1,d).getDay()]}`;
  da=SN[dg(sel).glow||0];applyDial(da,true);renderNotes();document.getElementById('ni').value='';
}
function renderNotes(){
  if(!sel)return;
  const data=dg(sel),list=document.getElementById('nl');list.innerHTML='';
  const lv=LV(),gi=data.glow||0,dotBg=gi>0?lv[gi].bg:(theme==='light'?'#ccc':'#222');
  if(!data.notes?.length){const e=document.createElement('div');e.className='ne';e.textContent='Ещё ничего не записано';list.appendChild(e);return;}
  data.notes.forEach((t,i)=>{
    const row=document.createElement('div');row.className='nr';
    const dot=document.createElement('div');dot.className='ndt';dot.style.background=dotBg;
    const txt=document.createElement('div');txt.className='nt';txt.textContent=t;
    const del=document.createElement('button');del.className='ndl';del.textContent='×';
    del.addEventListener('click',()=>{hTap();data.notes.splice(i,1);save(SK.c,db);render();renderNotes();});
    row.appendChild(dot);row.appendChild(txt);row.appendChild(del);list.appendChild(row);
  });
}
async function addNote(){const inp=document.getElementById('ni'),v=inp.value.trim();if(!v||!sel)return;const d=dg(sel);if(d.notes.length>=15)return;d.notes.push(v);save(SK.c,db);hNote();render();renderNotes();inp.value='';inp.focus();}

// tabs
function switchTab(t){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('v'+t).classList.add('on');document.getElementById('tab-'+t).classList.add('on');if(t==='todo')renderTodos();}
document.getElementById('tab-cal').addEventListener('click',()=>{switchTab('cal');hTap();});
document.getElementById('tab-todo').addEventListener('click',()=>{switchTab('todo');hTap();});

// todo
let dragSt=null;
const SECS={today:{lst:'lt',cnt:'ct'},tomorrow:{lst:'ltm',cnt:'ctm'},later:{lst:'ll',cnt:'cl'}};
function todayKey(){const d=new Date();return key(d.getFullYear(),d.getMonth(),d.getDate());}
function renderTodos(){
  Object.keys(SECS).forEach(sec=>{
    const ids=SECS[sec],list=document.getElementById(ids.lst);list.innerHTML='';
    const items=todos.filter(t=>t.section===sec).sort((a,b)=>{
      if(sec==='later'){if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;return a.date.localeCompare(b.date);}
      return(a.done?1:0)-(b.done?1:0);
    });
    document.getElementById(ids.cnt).textContent=items.length||'';
    items.forEach(t=>list.appendChild(mkTEl(t)));
  });checkSync();
}
function mkTEl(todo){
  const el=document.createElement('div');el.className='ti2'+(todo.done?' done':'');el.dataset.id=todo.id;
  const ck=document.createElement('div');ck.className='ck';
  const tw=document.createElement('div');tw.className='tw';
  const tt=document.createElement('div');tt.className='tt';tt.textContent=todo.text;tw.appendChild(tt);
  if(todo.section==='later'&&todo.date){const de=document.createElement('div');de.className='tdt';de.textContent=new Date(todo.date+'T00:00:00').toLocaleDateString('ru',{day:'numeric',month:'long'});tw.appendChild(de);}
  const dl=document.createElement('button');dl.className='tdl';dl.textContent='×';
  el.appendChild(ck);el.appendChild(tw);el.appendChild(dl);
  ck.addEventListener('pointerdown',e=>e.stopPropagation());
  ck.addEventListener('click',e=>{e.stopPropagation();todo.done=!todo.done;hTap();save(SK.t,todos);renderTodos();});
  dl.addEventListener('pointerdown',e=>e.stopPropagation());
  dl.addEventListener('click',e=>{e.stopPropagation();hTap();todos.splice(todos.indexOf(todo),1);save(SK.t,todos);renderTodos();});
  let dt=null,sx=0,sy=0;
  el.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;dt=setTimeout(()=>{dt=null;beginDrag(todo.id,el);},400);});
  el.addEventListener('pointermove',e=>{if(dragSt)return;if(Math.abs(e.clientX-sx)>6||Math.abs(e.clientY-sy)>6){clearTimeout(dt);dt=null;}});
  el.addEventListener('pointerup',()=>{clearTimeout(dt);dt=null;});
  el.addEventListener('pointercancel',()=>{clearTimeout(dt);dt=null;});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  return el;
}
function beginDrag(id,el){
  hTick();const r=el.getBoundingClientRect();
  const g=document.createElement('div');g.className='ghost';g.textContent=todos.find(t=>t.id===id)?.text||'';
  g.style.left=r.left+'px';g.style.top=r.top+'px';g.style.width=r.width+'px';
  document.body.appendChild(g);el.classList.add('da');
  document.documentElement.style.touchAction='none';
  const av=document.querySelector('.view.on');if(av)av.style.overflow='hidden';
  dragSt={id,g,el,sec:todos.find(t=>t.id===id)?.section};
}
function endDragClean(){
  if(!dragSt)return;
  if(document.body.contains(dragSt.g))document.body.removeChild(dragSt.g);
  dragSt.el.classList.remove('da');
  document.documentElement.style.touchAction='';
  const av=document.querySelector('.view.on');if(av)av.style.overflow='';
  ['today','tomorrow','later'].forEach(s=>document.getElementById('sec-'+s).classList.remove('dov'));
}
document.addEventListener('pointermove',e=>{
  if(!dragSt)return;
  dragSt.g.style.left=(e.clientX-dragSt.g.offsetWidth/2)+'px';
  dragSt.g.style.top=(e.clientY-24)+'px';
  let found=null;
  ['today','tomorrow','later'].forEach(sec=>{const r=document.getElementById('sec-'+sec).getBoundingClientRect();if(e.clientY>=r.top&&e.clientY<=r.bottom){found=sec;document.getElementById('sec-'+sec).classList.add('dov');}else document.getElementById('sec-'+sec).classList.remove('dov');});
  if(found)dragSt.sec=found;
});
document.addEventListener('pointerup',async()=>{
  if(!dragSt)return;
  const{id,sec}=dragSt;endDragClean();
  const t=todos.find(x=>x.id===id);
  if(t&&sec&&t.section!==sec){t.section=sec;if(sec!=='later')t.date=null;hSnap();save(SK.t,todos);}
  dragSt=null;renderTodos();
});
document.addEventListener('pointercancel',()=>{if(!dragSt)return;endDragClean();dragSt=null;renderTodos();});

async function addTodo(sec){
  const ids={today:'ait',tomorrow:'aitm',later:'ail'};
  const inp=document.getElementById(ids[sec]),v=inp.value.trim();if(!v)return;
  const di=sec==='later'?document.getElementById('datl'):null;
  todos.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),text:v,section:sec,date:di?.value||null,done:false,createdAt:new Date().toISOString()});
  inp.value='';if(di)di.value='';hNote();save(SK.t,todos);renderTodos();
}
document.querySelectorAll('.tpb').forEach(b=>b.addEventListener('click',()=>addTodo(b.dataset.sec)));
[['ait','today'],['aitm','tomorrow'],['ail','later']].forEach(([id,sec])=>{document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')addTodo(sec);});});

function checkSync(){const n=todos.filter(t=>t.section==='today'&&t.done).length;const b=document.getElementById('sbar');if(n>0){document.getElementById('stx').textContent=`${n} ${n===1?'задача выполнена':n<5?'задачи выполнены':'задач выполнено'} — обновить свечение?`;b.style.display='flex';}else b.style.display='none';}
document.getElementById('sbt').addEventListener('click',()=>{const n=todos.filter(t=>t.section==='today'&&t.done).length;dg(todayKey()).glow=Math.min(4,n);save(SK.c,db);hNote();switchTab('cal');sel=todayKey();render();renderPanel();});

// cal nav
document.getElementById('pb').addEventListener('click',()=>{cm--;if(cm<0){cm=11;cy--;}hTap();sel=null;document.getElementById('dp').style.display='none';render();});
document.getElementById('nbt').addEventListener('click',()=>{cm++;if(cm>11){cm=0;cy++;}hTap();sel=null;document.getElementById('dp').style.display='none';render();});
document.getElementById('xb').addEventListener('click',()=>{sel=null;document.getElementById('dp').style.display='none';render();});
document.getElementById('ab').addEventListener('click',addNote);
document.getElementById('ni').addEventListener('keydown',e=>{if(e.key==='Enter')addNote();});
document.getElementById('hbt').addEventListener('click',()=>{const p=document.getElementById('hpan');const o=p.classList.toggle('on');document.getElementById('hbt').textContent=o?'скрыть':'как это работает?';hTap();});

// init
renderDOW();initDial();
loadAll().then(()=>{applyTheme(false);render();});
</script>
</body>
</html>
